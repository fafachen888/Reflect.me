name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build web app
        run: pnpm build

      - name: Setup Capacitor
        run: |
          npx cap init "镜遇" "com.jingyu.app" --web-dir=dist
          npx cap add android          

      - name: Capacitor Sync
        run: pnpm cap sync android

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug          

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jingyu-app.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
